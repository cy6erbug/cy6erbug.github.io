                var element = document.createElement("a");

                $(element).attr("href", $(this).attr("src"));
                if (lazyloadT) {
                    $(element).attr("href", $(this).attr("data-srcset"));
                }
                $(this).wrap(element);
            });

                }
                $(this).wrap(element);
            });
        }
    </script>
